<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 3 - Gender Validation</title>
</head>
<body>
    <form id="genderForm">
        <fieldset style="display: inline-block; padding: 10px;">
            <legend>Gender</legend>
            <input type="radio" name="gender" value="Male" id="male">
            <label for="male">Male</label>
            
            <input type="radio" name="gender" value="Female" id="female">
            <label for="female">Female</label>
            
            <input type="radio" name="gender" value="Other" id="other">
            <label for="other">Other</label>
        </fieldset>
        <br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById('genderForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Check if any radio button with name "gender" is checked
            const isSelected = document.querySelector('input[name="gender"]:checked');

            if (!isSelected) {
                alert("Validation Error: At least one option has to be selected.");
            } else {
                alert("Success: You selected " + isSelected.value);
            }
        });
    </script>
</body>
</html>
