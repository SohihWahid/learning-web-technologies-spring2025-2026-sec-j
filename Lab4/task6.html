<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6 - Blood Group Validation</title>
</head>
<body>
    <form id="bloodGroupForm">
        <label for="bloodGroup">Blood Group</label>
        <select id="bloodGroup">
            <option value="">Select</option> <option value="A+">A+</option>
            <option value="A-">A-</option>
            <option value="B+">B+</option>
            <option value="B-">B-</option>
            <option value="O+">O+</option>
            <option value="O-">O-</option>
            <option value="AB+">AB+</option>
            <option value="AB-">AB-</option>
        </select>
        <br><br>
        <button type="submit">Submit</button>
    </form>

    <script>
        document.getElementById('bloodGroupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const bloodGroup = document.getElementById('bloodGroup').value;

            // Rule i: Must be selected
            if (bloodGroup === "") {
                alert("Validation Error: A blood group must be selected.");
            } else {
                alert("Success: You selected " + bloodGroup);
            }
        });
    </script>
</body>
</html>
